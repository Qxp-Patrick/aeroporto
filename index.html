<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voz Luno - Treino Aeroporto</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            padding-top: 75px; /* Espaço para o botão fixo do topo */
            color: #2c3e50;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        /* Topo Fixo com o Botão Inverter */
        .topo-acoes {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: #ffffff;
            padding: 12px 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            z-index: 1000;
            display: flex;
            justify-content: center;
        }
        
        /* Botão Inverter seguindo o padrão 3D escuro do App */
        .btn-inverter {
            background: linear-gradient(to bottom, #4a4a4a 0%, #2b2b2b 100%);
            color: white;
            border: 1px solid #1a1a1a;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 2px 4px rgba(0,0,0,0.3);
            text-shadow: 0 -1px 0 rgba(0,0,0,0.4);
        }
        .btn-inverter.ativo {
            background: linear-gradient(to bottom, #2ecc71 0%, #27ae60 100%);
            border-color: #1e7e43;
        }
        
        /* Estilização dos Cards */
        .card {
            background: white;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            border-left: 5px solid #4a4a4a;
        }
        .frase-guia {
            font-size: 1.2em;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 14px;
            display: block;
            line-height: 1.4;
        }
        
        /* Botão de Microfone IDÊNTICO ao estilo 3D da foto enviada */
        .btn-mic {
            background: linear-gradient(to bottom, #4c4c4c 0%, #2c2c2c 100%);
            color: white;
            border: 1px solid #1a1a1a;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 3px 5px rgba(0,0,0,0.4);
            text-shadow: 0 -1px 0 rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }
        .btn-mic:active {
            transform: scale(0.99);
            background: linear-gradient(to bottom, #222222 0%, #333333 100%);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
        }
        .btn-mic.listening {
            background: linear-gradient(to bottom, #e74c3c 0%, #c0392b 100%);
            border-color: #7f8c8d;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }
        .revelacao {
            margin-top: 15px;
            font-style: italic;
            color: #555;
            display: none;
            border-top: 1px dashed #e0e0e0;
            padding-top: 12px;
            font-size: 0.95em;
        }
        .feedback {
            margin-top: 12px;
            font-family: inherit;
            font-size: 1.1em;
            line-height: 1.6;
        }
        .correct { color: #27ae60; font-weight: bold; }
        .incorrect { color: #e67e22; font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

<div class="topo-acoes">
    <button class="btn-inverter" id="toggle-modo" onclick="alternarModo()">
        🔄 Modo: Espanhol ➔ Português
    </button>
</div>

<div class="container">
    <div id="lista-frases"></div>
</div>

<script>
    const frases = [
        ["¿Dónde está el mostrador de la aerolínea?", "Onde fica o balcão da companhia aérea?"],
        ["Quisiera hacer el check-in, por favor.", "Gostaria de fazer o check-in, por favor."],
        ["Aquí tiene mi pasaporte y mi reserva.", "Aqui está meu passaporte e minha reserva."],
        ["¿A qué hora sale el vuelo?", "A que horas sai o voo?"],
        ["¿El vuelo está a tempo o tiene retraso?", "O voo está no horário ou tem atraso?"],
        ["¿Cuántas maletas puedo facturar?", "Quantas malas posso despachar?"],
        ["Solo tengo equipaje de mano.", "Tenho apenas bagagem de mão."],
        ["Tengo que facturar esta maleta.", "Tengo que despachar esta mala."],
        ["¿Tengo que pagar por exceso de equipaje?", "Tenho que pagar por excesso de bagagem?"],
        ["¿Me puede dar un asiento de pasillo o ventana?", "Pode me dar um assento no corredor ou janela?"],
        ["¿Dónde está mi puerta de embarque?", "Onde é o meu portão de embarque?"],
        ["Aquí tiene su tarjeta de embarque.", "Aqui está o seu cartão de embarque."],
        ["Por favor, ponga sus pertenencias en la bandeja.", "Por favor, coloque seus pertences na bandeja."],
        ["¿Tengo que quitarme los zapatos y el cinturón?", "Tenho que tirar os sapatos e o cinto?"],
        ["Saque los aparatos electrónicos de la maleta.", "Tire os aparelhos eletrônicos da mala."],
        ["¿Lleva algún líquido en su equipaje?", "Leva algum líquido na sua bagagem?"],
        ["¿Cuál es el motivo de su viaje?", "Qual é o motivo da sua viagem?"],
        ["Vengo de vacaciones o por negocios.", "Vim de férias ou a negócios."],
        ["¿Cuánto tiempo se va a quedar en el país?", "Quanto tempo vai ficar no país?"],
        ["Me quedaré por una semana.", "Ficarei por uma semana."],
        ["¿Dónde se va a hospedar?", "Onde você vai se hospedar?"],
        ["Tengo una reserva en este hotel.", "Tenho uma reserva neste hotel."],
        ["¿Dónde están los servicios o aseos?", "Onde ficam os banheiros?"],
        ["¿Hay alguna red de Wi-Fi gratuita?", "Tem alguma rede Wi-Fi gratuita?"],
        ["¿Dónde puedo cambiar dinero?", "Onde posso trocar dinheiro?"],
        ["El vuelo con destino a Madrid ha sido cancelado.", "O voo com destino a Madri foi cancelado."],
        ["Última llamada para el vuelo uno dos tres.", "Última chamada para o voo 123."],
        ["¿Ya empezó el embarque?", "O embarque já começou?"],
        ["Tengo una escala en Bogotá.", "Tengo uma escala em Bogotá."],
        ["¿Tengo que recoger mi maleta en la escala?", "Tenho que retirar minha mala na escala?"],
        ["Mi vuelo de conexión sale en una hora.", "Meu voo de conexão sai em uma hora."],
        ["¿Podría ayudarme con mi maleta, por favor?", "Poderia me ajudar com minha mala, por favor?"],
        ["Este es mi asiento.", "Este é o meu assento."],
        ["¿Puedo cambiar de asiento?", "Posso trocar de assento?"],
        ["Por favor, abróchense los cintunores.", "Por favor, apertem os cintos."],
        ["Ponga su móvil en modo avión.", "Coloque seu celular no modo avião."],
        ["¿Me puede dar una manta o almohada?", "Pode me dar um cobertor ou travesseiro?"],
        ["¿A qué hora aterrizaremos?", "A que horas vamos aterrissar?"],
        ["¿Qué desea para beber?", "O que deseja para beber?"],
        ["¿Tienen alguna opción vegetariana?", "Vocês têm alguma opção vegetariana?"],
        ["Agua sin gas, por favor.", "Água sem gás, por favor."],
        ["¿Dónde está la recogida de equipajes?", "Onde é a retirada de bagagens?"],
        ["¿En qué cinta sale mi vuelo?", "Em qual esteira sai o meu voo?"],
        ["Mi maleta no ha salido.", "Minha mala não saiu."],
        ["Mi equipaje está dañado.", "Minha bagagem está danificada."],
        ["¿Dónde puedo hacer una reclamación?", "Onde posso fazer uma reclamação?"],
        ["¿Dónde puedo tomar un taxi o Uber?", "Onde posso pegar um táxi ou Uber?"],
        ["¿Hay una parada de autobús o metro cerca?", "Tem um ponto de ônibus ou metrô perto?"],
        ["¿Cuánto cuesta ir hasta el centro?", "Quanto custa ir até o centro?"],
        ["Bienvenido a nuestro país.", "Bem-vindo ao nosso país!"]
    ];

    let modoInvertido = false;
    const listaContainer = document.getElementById('lista-frases');

    function normalizar(texto) {
        return texto.toLowerCase()
            .replace(/[¿?¡!.,]/g, "")
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
            .trim();
    }

    function alternarModo() {
        modoInvertido = !modoInvertido;
        const btnModo = document.getElementById('toggle-modo');
        
        if(modoInvertido) {
            btnModo.innerText = "🔄 Desafio: Português ➔ Espanhol";
            btnModo.classList.add('ativo');
        } else {
            btnModo.innerText = "🔄 Modo: Espanhol ➔ Português";
            btnModo.classList.remove('ativo');
        }
        renderizarLista();
    }

    function comparar(original, falado, feedbackId, tradId) {
        const originalWords = original.split(' ');
        const faladoWords = normalizar(falado).split(' ');
        
        let htmlResultado = "";
        
        originalWords.forEach(word => {
            const wordClean = normalizar(word);
            if (faladoWords.includes(wordClean)) {
                htmlResultado += `<span class="correct">${word}</span> `;
            } else {
                htmlResultado += `<span class="incorrect">${word}</span> `;
            }
        });

        document.getElementById(feedbackId).innerHTML = htmlResultado;
        document.getElementById(tradId).style.display = 'block';
    }

    function renderizarLista() {
        listaContainer.innerHTML = "";
        frases.forEach((par, index) => {
            const es = par[0];
            const pt = par[1];
            
            const fraseVisual = modoInvertido ? pt : es;
            const rotuloRevelacao = modoInvertido ? "Resposta certa em Espanhol:" : "Tradução:";
            const textoRevelacao = modoInvertido ? es : pt;

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="frase-guia">${fraseVisual}</span>
                <button class="btn-mic" id="btn-${index}" onclick="iniciarGravacao(${index})">
                    🎤 Traduzir e Falar
                </button>
                <div class="feedback" id="feedback-${index}"></div>
                <div class="revelacao" id="trad-${index}">
                    <strong>${rotuloRevelacao}</strong> ${textoRevelacao}
                </div>
            `;
            listaContainer.appendChild(card);
        });
    }

    function iniciarGravacao(index) {
        const btn = document.getElementById(`btn-${index}`);
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        
        recognition.lang = 'es-ES';
        recognition.interimResults = false;

        recognition.onstart = () => {
            btn.classList.add('listening');
            btn.innerText = 'Ouvindo... Fale agora';
        };

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            comparar(frases[index][0], text, `feedback-${index}`, `trad-${index}`);
        };

        recognition.onerror = () => {
            alert("Não consegui ouvir claramente. Tente novamente!");
        };

        recognition.onend = () => {
            btn.classList.remove('listening');
            btn.innerText = '🎤 Traduzir e Falar';
        };

        try {
            recognition.start();
        } catch (e) {
            alert("Erro ao acessar o microfone: " + e.message);
        }
    }

    renderizarLista();
</script>

</body>
</html>
